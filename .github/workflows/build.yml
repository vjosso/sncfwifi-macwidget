name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build SNCFWifi.app
        run: ./build.sh

      - name: Package app
        run: zip -r SNCFWifi.zip SNCFWifi.app

      # Push sur main → met à jour la release "latest" (rolling release)
      - name: Update rolling release (latest)
        if: github.ref_type != 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Dernière version (latest)"
          prerelease: false
          files: SNCFWifi.zip
          generate_release_notes: true
          # Marque cette release roulante comme « Latest » sur GitHub pour qu'elle
          # soit mise en avant et téléchargeable directement par les utilisateurs.
          make_latest: true

      # Push d'un tag (ex: v1.2.0) → Release officielle versionnée
      - name: Create versioned release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: SNCFWifi.zip
          generate_release_notes: true
          make_latest: true
